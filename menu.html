<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Allegria, your new restaurant in Adamstown. Come and try our authentic 
    napolitan style pizza cooked in a traditional wood fire oven and taste hapiness.">
    <meta name="keywords" content="Pizza, Pizzeria, Adamstown, authentic, traditional, casual dining">
    <title>Allegria | Menu</title>

    <!-- favicons generated by favicon.io -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">

    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar fixed-top navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <div class="logo">
                    <img src="assets/images/logo.jpg" id="logo" alt="allegria logo">
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="#">Menu</a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-target="#reservationModalToggle" data-bs-toggle="modal">Reservation</button>
                    <li class="nav-item">
                        <a class="nav-link" href="#footer">Contact us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>

    </main>

    <!-- Footer / contact section -->
    <footer id="footer" class="container mt-auto">
        <div class="row justify-content-center">
            <div class="col-12 text-center">
                <h2>Contact Us</h2>
            </div>
            <div class="row">
                <div class="col-12 col-md-6 col-xl-4 contact-info">
                    <h3>Contact info</h3>
                    <p>
                        <i class="fa-solid fa-phone"></i>
                        081 234 5678<br>
                        <i class="fa-regular fa-paper-plane"></i>
                        allegria-pizza@info.ie
                    </p>
                </div>
                <div class="col-12 col-md-6 col-xl-4 Location">
                    <h3>Location</h3>
                    <address>
                        <i class="fa-solid fa-location-dot"></i>
                        <strong>Allegria</strong><br>
                        1 South Crossings<br>
                        Adamstown, K78 V1V1
                    </address>
                </div>
                <div class="col-12 col-md-6 col-xl-4 follow-us">
                    <h3>Follow Us</h3>
                    <a href="https://www.instagram.com" target="_blank"
                        aria-label="Visit our Instagram page (opens in a new tab)" rel="noopener"><i
                            class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.facebook.com" target="_blank"
                        aria-label="Visit our Facebook page (opens in a new tab)" rel="noopener"><i
                            class="fa-brands fa-square-facebook"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Modal -->
<div class="modal fade" id="reservationModalToggle" aria-hidden="true" aria-labelledby="reservationModalToggleLabel"
     tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="reservationModalToggleLabel">Reservation</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form>
                        <div class="row">
                            <div class="col-12 col-lg-6 mb-3">
                                <label for="name" class="form-label">
                                    <i class="fa-solid fa-person"></i>
                                    Name*
                                </label>
                                <input class="form-control" id="name" name="name" type="text" required>
                            </div>
                            <div class="col-12 col-lg-6 mb-3">
                                <label for="phone" class="form-label">
                                    <i class="fa-solid fa-phone"></i>
                                    Phone number*
                                </label>
                                <input class="form-control" id="phone" name="phone" type="number" required>
                            </div>
                            <div class="col-12 col-lg-6 mb-3">
                                <label for="date" class="form-label">
                                    <i class="fa-regular fa-calendar-days"></i>
                                    Date*
                                </label>
                                <input class="form-control" id="date" name="date" type="date" required>
                            </div>

                            <div class="col-12 col-lg-6 mb-3">
                                <label for="time" class="form-label">
                                    <i class="fa-regular fa-clock"></i>
                                    Time*
                                </label>
                                <select class="form-select" id="time" name="time" type="time" required><small>Please
                                     call us for Sunday bookings</small>
                                    <option value="" selected>Select</option>
                                    <option value="4">4:00</option>
                                    <option value="4:30">4:30</option>
                                    <option value="5">5:00</option>
                                    <option value="5:30">5:30</option>
                                    <option value="6">6:00</option>
                                    <option value="6:30">6:30</option>
                                    <option value="7">7:00</option>
                                    <option value="7:30">7:30</option>
                                    <option value="8">8:00</option>
                                    <option value="8:30">8:30</option>
                                    <option value="9">9:00</option>
                                </select>
                            </div>
                            <div class="col-12 col-lg-6 mb-3">
                                <label for="number" class="form-label">
                                    <i class="fa-solid fa-list-ol"></i>
                                    Number of guests*
                                </label>
                                <input class="form-control" id="number" name="number" type="number" min="1" max="12"
                                 required>
                            </div>
                            <div class="col-12 mb-3">
                                <label for="message" class="form-label">
                                    <i class="fa-regular fa-message"></i>
                                    Message
                                </label>
                                <textarea class="form-control" rows="4" id="message" name="message" placeholder="Write a message..."></textarea>
                            </div>
                            <small>* Indicates a mandatory field</small>
                        </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" data-bs-target="#exampleModalToggle2"
                    data-bs-toggle="modal">Submit</button>
            </div>
        </div>
    </div>
</div>    
 <div class="modal fade" id="exampleModalToggle2" aria-hidden="true" aria-labelledby="exampleModalToggleLabel2"
     tabindex="-1">
     <div class="modal-dialog modal-dialog-centered">
         <div class="modal-content">
             <div class="modal-header">
                 <h1 class="modal-title fs-5" id="exampleModalToggleLabel2">Congratulations!</h1>
                 <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
             </div>
             <div class="modal-body text-center">
                 Your booking at Allegria is confirmed
                 <br>
                 <i class="fa-solid fa-check"></i>
             </div>
             <div class="modal-footer">
                 <button class="btn btn-primary" data-bs-toggle="modal">Close</button>
             </div>
         </div>
     </div>
 </div>


    <!--Boostrap script for JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>

    <!-- Font Awesome kit -->
    <script src="https://kit.fontawesome.com/7709c2b732.js" crossorigin="anonymous"></script>

</body>

</html>
